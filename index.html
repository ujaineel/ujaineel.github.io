<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaineel Upadhyay | Software Engineer</title>
  <link rel="stylesheet" href="/src/style.css">
  <meta name="description" content="Portfolio of Jaineel Upadhyay - Software Engineer specializing in high-volume systems.">
</head>
<body>
  <header>
    <div class="logo label-md" style="font-weight: 800; color: var(--primary);">Jaineel Upadhyay.</div>
    <nav>
      <a href="#hero">Start</a>
      <a href="#work">Work</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Skills</a>
    </nav>
  </header>

  <main>
    <!-- Dynamic Hero -->
    <section id="hero" class="section">
      <div class="container hero-grid">
        <!-- Populated by main.js -->
      </div>
    </section>

    <!-- Experience Section -->
    <section id="work" class="section layer-low">
      <div class="container">
        <div style="margin-bottom: var(--spacing-12);">
          <p class="label-md">Chronicle</p>
          <h2>Professional Journey</h2>
        </div>
        <div id="experience-list" class="experience-grid">
          <!-- Populated by main.js -->
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section">
      <div class="container">
        <div style="margin-bottom: var(--spacing-12); text-align: center;">
          <p class="label-md">Projects</p>
          <h2>Just For Fun or Interesting Ones</h2>
        </div>
        <div id="project-grid" class="project-grid">
          <!-- Populated by main.js -->
        </div>
      </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="section">
           <!-- Populated by main.js -->
    </section>

    <!-- Contact section -->
    <section id="contact" class="section">
       <!-- Populated by main.js -->
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p class="label-sm">Feel free to reach out!</p>
        <div class="footer-links">
          <a href="https://github.com/ujaineel" target="_blank">GitHub</a>
          <a href="https://linkedin.com/in/ujaineel" target="_blank">LinkedIn</a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
